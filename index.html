<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MANSION | Architect Reference Portfolio</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div id="global-bg"></div>
    <div id="global-overlay"></div>



    <header id="interactive-map">
        <div class="map-controls">
            <button id="toggle-map-nodes" class="btn-map"><span class="icon">👁️</span> <span class="text">Hide
                    Nodes</span></button>
            <button id="toggle-map-lock" class="btn-map"><span class="icon">🔒</span> <span class="text">Map
                    Locked</span></button>
            <button id="btn-site-imagery" class="btn-map"><span class="icon">🖼️</span> <span class="text">Site
                    imagery</span></button>
            <button id="btn-topography" class="btn-map"><span class="icon">�</span> <span class="text">Topography
                    file</span></button>
            <button id="btn-integrated-concepts" class="btn-map"><span class="icon">💡</span> <span
                    class="text">Integrated concepts</span></button>
            <div class="search-box">
                <span class="search-icon">#</span>
                <input type="text" id="asset-search" placeholder="GOTO ID (001...)" maxlength="3">
            </div>
            <button id="export-map-positions" class="btn-map" style="display: none;">⬇ Copy Node Data</button>
        </div>

        <div id="node-edit-panel" class="node-edit-panel" style="display: none;">
            <h4>Edit Node: <span id="edit-node-title"></span></h4>
            <div class="edit-group">
                <label>Pos X:</label><input type="number" id="edit-node-x">
            </div>
            <div class="edit-group">
                <label>Pos Y:</label><input type="number" id="edit-node-y">
            </div>
            <div class="edit-group">
                <label>Width:</label><input type="number" id="edit-node-width">
            </div>
            <div class="edit-group">
                <label>Height:</label><input type="number" id="edit-node-height">
            </div>
            <div class="edit-group">
                <label>Letter Size:</label><input type="number" id="edit-node-font">
            </div>
        </div>

        <div id="map-container" class="map-container">
            <!-- Map rendered via JS -->
        </div>
    </header>



    <!-- Project Gallery Section -->
    <section id="gallery-section">
        <div class="section-head">
            <h2>Project Details</h2>
            <div class="divider"></div>
            <div class="filters" id="category-filters">
                <button class="filter-btn active" data-category="all">All Details</button>
            </div>
        </div>
        <div class="grid" id="main-grid">
            <!-- Dynamically Populated -->
        </div>
        <div class="back-to-map"><a href="#interactive-map" class="btn-back-map">↑ Back to Spatial Map</a></div>
    </section>

    <!-- Topography Modal -->
    <div id="topography-modal" class="modal">
        <div class="modal-content">
            <div id="modal-close">&times;</div>
            <h3>Download Topography</h3>
            <p>Download the topography of the site, a DWG file.</p>
            <div style="margin-top: 30px;">
                <a href="Buitrera_17Feb2026.dwg" download class="btn-back-map"
                    style="background: var(--accent-color); color: var(--bg-color);">Download DWG</a>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox">
        <div id="lightbox-close">&times;</div>
        <div id="lightbox-content">
            <div id="lightbox-media-container"></div>
            <h4 id="lightbox-title"></h4>
        </div>
    </div>

    <footer>
        <div
            style="padding: 100px 0; text-align: center; color: var(--text-secondary); font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05);">
            &copy; 2026 THE MANSION PROJECT | ARCHITECTURAL VISION
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
